      background: '0x16161c' # darker grey
      foreground: '0xe3e6ee'

    # Normal colors
    normal:
      black: '0x2e303e'     # darkish grey
      red: '0xe95678'       # pink
      green: '0x29d398'     # green
      yellow: '0xfab795'    # dark orange
      blue: '0x26bbd9'
      magenta: '0xee64ac'
      cyan: '0x59e1e3'
      white: '0xe3e6ee'

    # Bright colors
