[colors.bright]
black = "0x6f6f70"
blue = "0x3fc4de"
cyan = "0x6be4e6"
green = "0x3fdaa4"
magenta = "0xf075b5"
red = "0xec6a88"
white = "0xffffff"
yellow = "0xfbc3a7"

[colors.normal]
black = "0x2e303e"
blue = "0x26bbd9"
cyan = "0x59e1e3"
green = "0x29d398"
magenta = "0xee64ac"
red = "0xe95678"
white = "0xe3e6ee"
yellow = "0xfab795"

[colors.primary]
background = "0x16161c"
foreground = "0xe3e6ee"

[colors.vi_mode_cursor]
cursor = "CellForeground"
text = "CellBackground"

[cursor]
vi_mode_style = "Beam"

[cursor.style]
blinking = "On"
shape = "Beam"

[font]
size = 14

[font.bold]
family = "FiraCode Nerd Font"
style = "Semibold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Regular Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Command"

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "Up"
mods = "Command"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "Down"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001Bb"
key = "Left"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bf"
key = "Right"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001BOH"
key = "Left"
mode = "AppCursor"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001BOF"
key = "Right"
mode = "AppCursor"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0015"
key = "Back"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B\u007F"
key = "Back"
mods = "Alt"

[mouse]
hide_when_typing = false

[window]
decorations = "buttonless"
dynamic_title = true
opacity = 0.8
startup_mode = "Windowed"

[window.padding]
x = 10
y = 10
